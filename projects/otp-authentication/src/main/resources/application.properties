spring.application.name=springboot-otp-auth

# application.properties
spring.datasource.url=jdbc:mysql://localhost:3306/otp_auth_db?useSSL=false
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=your-256-bit-secret
jwt.expiration.ms=86400000 # 24 hours

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio Configuration (optional)
twilio.account.sid=${env.TWILIO_ACCOUNT_SID}
twilio.auth.token=${env.TWILIO_AUTH_TOKEN}
twilio.phone.number=+1234567890
twilio.region=${env.TWILIO_REGION}
twilio.edge=${env.TWILIO_EDGE}