databaseChangeLog:
  - changeSet:
      id: create-event-store-table
      author: shortthirdman
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: event_store
      changes:
        - createTable:
            tableName: event_store
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_data
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: sequence_number
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_event_store_aggregate_id
            tableName: event_store
            columns:
              - column:
                  name: aggregate_id
        - createIndex:
            indexName: idx_event_store_timestamp
            tableName: event_store
            columns:
              - column:
                  name: timestamp
        - createIndex:
            indexName: idx_event_store_event_type
            tableName: event_store
            columns:
              - column:
                  name: event_type