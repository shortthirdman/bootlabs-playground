# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Maven CI (Parallel Mode)

on:
  # push:
    # branches: [ "main" ]
  # pull_request:
    # branches: [ "main" ]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract-modules:
    name: Extract Maven Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xmlstarlet
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Extract module list from parent POM
        id: set-matrix
        run: |
          MODULES=$(xmlstarlet sel -t -m "/project/modules/module" -v . -n pom.xml | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Parsed modules JSON: $MODULES"
          echo "matrix=$MODULES" >> $GITHUB_OUTPUT

  parallel-build:
    name: Build ${{ matrix.module }}
    needs: extract-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.extract-modules.outputs.matrix) }}
      fail-fast: false  # Optional: allow other modules to finish even if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build module ${{ matrix.module }}
        run: |
          echo "🔨 Building module: ${{ matrix.module }}"
          mvn -B -f "${{ matrix.module }}/pom.xml" clean package
